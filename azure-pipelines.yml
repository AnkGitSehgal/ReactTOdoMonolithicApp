trigger: none 
pool: 
  name: App_Pool
stages:
- stage: Scanning 
  jobs:
  - job:
    displayName: Scanning WIP
    steps:
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: |
          Invoke-WebRequest -Uri "https://github.com/biomejs/biome/releases/latest/download/biome.exe" -OutFile "$(Agent.ToolsDirectory)\biome.exe"
          & "$(Agent.ToolsDirectory)\biome.exe" lint "$(System.DefaultWorkingDirectory)"
          if ($LASTEXITCODE -ne 0) {
          Write-Error "Biome lint failed"
          exit 1
          }
