trigger: none 
pool: App_Pool
stages:
  - stage: Scanning 
    jobs:
    - job:
      displayName: Scanning WIP
      steps:
       - task: PowerShell@2
         inputs:
           targetType: 'inline'
           script: |
             Invoke-WebRequest -Uri "https://github.com/biomejs/biome/releases/latest/download/biome-windows-x64.exe" -OutFile "biome.exe"
             & ".\biome.exe" lint "$(System.DefaultWorkingDirectory)"