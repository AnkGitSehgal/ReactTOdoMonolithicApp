- stage: SAST
  displayName: StaticApplicationSecurityTes
  jobs:
  - job: 
    displayName: SonarQubeTool
    steps:
    - task: SonarQubePrepare@8
      inputs:
        SonarQube: 'SonarConnection'
        scannerMode: 'cli'
        configMode: 'manual'
        cliProjectKey: 'react-app'
        cliProjectName: 'todo'
        cliSources: '.'
        extraProperties: 'sonar.scanner.skipJreProvisioning=true'
        
    - task: SonarQubeAnalyze@8
      inputs:
        jdkversion: 'JAVA_HOME_17_X64'
    - task: SonarQubePublish@8
      inputs:
        pollingTimeoutSec: '300'


