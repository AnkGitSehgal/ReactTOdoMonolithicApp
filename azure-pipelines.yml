trigger: none 
pool: App_Pool
stages:
  - stage: Scanning 
    jobs:
    - job:
      displayName: Scanning WIP
      steps:
        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: 'curl.exe -L -o biome.zip https://github.com/biomejs/biome/releases/latest/download/biome-windows-x64.zip; Expand-Archive biome.zip -DestinationPath . -Force; & ".\biome.exe" lint "$(System.DefaultWorkingDirectory)"'