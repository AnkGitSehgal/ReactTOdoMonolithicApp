- stage: BuildStage
  jobs:
  - job: 
    steps:
    - task: NodeAndNpmTool@1
      inputs:
        versionSpec: '18.x'
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: |
          npm install
          npm run build
        workingDirectory: '$(System.DefaultWorkingDirectory)'
    - task: PublishPipelineArtifact@1
      displayName: PublishingArtifact
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/build'
        artifact: 'BuildDrop'
        publishLocation: 'pipeline'
- stage: DeployCountinue
  jobs:
  - job:
    displayName: DownloadArtifact
    steps:
    - task: DownloadPipelineArtifact@2
      inputs:
        buildType: 'current'
        artifactName: 'BuildDrop'
        targetPath: '$(System.DefaultWorkingDirectory)/build_artifact'
    - task: CopyFilesOverSSH@0
      inputs:
        sshEndpoint: 'AnkitVM'
        sourceFolder: '$(System.DefaultWorkingDirectory)/build_artifact'
        contents: '**'
        targetFolder: '/Home/AnkitAPP'
        readyTimeout: '20000'
    - task: SSH@0
      inputs:
        sshEndpoint: 'AnkitVM'
        runOptions: 'commands'
        commands: 'sudo cp -r /Home/AnkitAPP/* /var/www/html'
        readyTimeout: '20000'