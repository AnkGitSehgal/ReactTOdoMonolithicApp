trigger: none 
pool: App_Pool
stages:
  - stage: Scanning 
    jobs:
    - job:
      displayName: Scanning WIP
      steps:
        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: |
              Invoke-WebRequest –Uri "https://github.com/biomejs/biome/releases/download/%40biomejs%2Fbiome%402.4.12/biome-win32-x64.exe" -OutFile "$(Agent.ToolsDirectory)\biome.exe" 
              & "$(Agent.ToolsDirectory)\biome.exe" lint "$(System.DefaultWorkingDirectory)"